<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .my-border { border: 1px solid #ccc; padding: 20px; border-radius: 10px; background: white; }
        .is-invalid::placeholder { color: red; }
    </style>
</head>
<body class="bg-light">

<div class="container">
    
    <div class="row justify-content-center mt-5">
        
        <div class="col-11 col-md-6 col-lg-4">
            
            <div class="my-border">
                <h2 class="text-center mb-4">Registration</h2>
                
                <form id="regForm">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" id="name" class="form-control" placeholder="Enter Name">
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="text" id="email" class="form-control" placeholder="Enter Email">
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Enter Password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
            </div>

        </div>
    </div>
</div>

<script>
const form = document.getElementById("regForm");

form.addEventListener("submit", function(event){
    event.preventDefault();

    let nInput = document.getElementById("name");
    let eInput = document.getElementById("email");
    let pInput = document.getElementById("password");

    nInput.classList.remove("is-invalid");
    eInput.classList.remove("is-invalid");
    pInput.classList.remove("is-invalid");

    let isValid = true;

    if(nInput.value.trim() === ""){
        nInput.value = ""; nInput.placeholder = "Name Cannot be empty!";
        nInput.classList.add("is-invalid");
        isValid = false;
    }

    if(!eInput.value.includes("@")){
        eInput.value = ""; eInput.placeholder = "Invalid Email Address!";
        eInput.classList.add("is-invalid");
        isValid = false;
    }

    if(pInput.value.length < 6){
        pInput.value = ""; pInput.placeholder = "Password must be min 6";
        pInput.classList.add("is-invalid");
        isValid = false;
    }

    if(isValid){
        alert("Success!");
        form.submit();
    }
});
</script>

</body>
</html>
