<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Multi-Section Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* This makes the jump to sections smooth instead of a sudden snap */
        html {
            scroll-behavior: smooth;
        }

        /* Adding height and padding so each section fills the screen */
        section {
            padding: 100px 0;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Different colors to tell the sections apart */
        #home { background-color: #f8f9fa; }
        #about { background-color: #e9ecef; }
        #services { background-color: #dee2e6; }
        #contact { background-color: #ced4da; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#home">MyWebsite</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#services">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<section id="home">
    <div class="container">
        <h1 class="display-4">This is Home</h1>
        <p class="lead">Welcome to the landing page.</p>
    </div>
</section>

<section id="about">
    <div class="container">
        <h1 class="display-4">This is About</h1>
        <p class="lead">Learn more about what we do here.</p>
    </div>
</section>

<section id="services">
    <div class="container">
        <h1 class="display-4">This is Services</h1>
        <p class="lead">Check out the professional services we offer.</p>
    </div>
</section>

<section id="contact">
    <div class="container">
        <h1 class="display-4">This is Contact</h1>
        <p class="lead">Get in touch with us today!</p>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
