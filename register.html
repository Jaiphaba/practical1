<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <!-- <script src="js/script.js"></script> -->
</head>

<body>
<div class="container">
    <div class="row">
        <div class="col-md-12">
            
                <div class="row">
                    <div class="col-md-12">
                        <h2>User Information</h2>
                    </div>
                </div>

            <form>

                <div class="row">
                    
                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Enter your name" name="full_name"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Enter your father's name" name="father_name"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Enter Aadhaar number" name="aadhaar"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="email" class="form-control" placeholder="Enter Email" name="email"/>
                    </div>
 
                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="password" class="form-control" placeholder="Enter password" name="password"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <select class="form-control">
                            <option value="">Select an option</option>
                            <option value="10th">10th</option>
                            <option value="12th">12th</option>
                            <option value="Graduate">Graduate</option>
                            <option value="Masters">Master</option>
                            <option value="PHD">PHD</option>
                        </select>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <select class="form-control">
                            <option value="">Gender</option>
                            <option value="MALE">MALE</option>
                            <option value="FEMALE">FEMALE</option>
                        </select>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="date" class="form-control" name="dob"/>
                    </div>

                </div>

                <div class="row">
                    <div class="col-md-12">
                        <h2>Bank details information</h2>
                    </div>
                </div>

                <div class="row">

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Account holder name" name="account_name"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Bank name" name="bank_name"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="Account number" name="account_number"/>
                    </div>

                    <div class="col-sm-4 col-md-6 col-lg-4 form-group">
                        <input type="text" class="form-control" placeholder="IFSC code" name="ifsc"/>
                    </div>

                </div>

                
                <div class="row">
                    <div class="col-md-12 text-center">
                        <button type="submit" class="submit-btn">
                            Submit
                        </button>
                    </div>
                </div>

            </form>

        </div>
    </div>
</div>


<style>
    .container{
        /* background-color: aqua; */
        margin-top: 50px;
    }
.form-group {
    margin-top: 20px;
    /* background-color: #10d378; */
}

h2 , h1 {
    margin-top: 40px;
    font-weight: 700;
    padding-bottom: 10px;
    display: inline-block;
}

.submit-btn {
    margin-top: 30px;
    background-color: #1691af;
    padding: 10px 25px;
    border:none;
    border-radius:6px;
    font-weight:600;
}

.submit-btn:hover {
    background-color: #046796;
   
    box-shadow: 0px 8px 18px rgba(1, 67, 71, 0.35);
}
</style>

</body>
</html>
